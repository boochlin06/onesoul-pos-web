<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員卡</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/localization/messages_zh_TW.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@9"></script>
    <style>
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="card">
            <div class="card-body position-relative">
                <h2 class='card-title mb-4'>會員登入</h2>
                <button id="logoutBtn" class="btn btn-outline-secondary position-absolute top-0 end-0 mt-3 me-3" style="display: none;">登出</button>

                <div id="loadingIndicator" style="display: none;">
                    <div class="d-flex justify-content-center">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">讀取中...</span>
                        </div>
                    </div>
                    <p class="text-center mt-2">正在檢查登入狀態...</p>
                </div>

                <form action="<?!= global['url'] ?>" id="myForm" class="mb-5" method="POST">
                    <div class="mb-3">
                        <label for="tel" class="form-label">
                            玩家電話
                            <span class="text-danger">*</span>
                            <small class="text-muted">(註冊時留下的電話)</small>
                        </label>
                        <div class="input-group">
                            <input type="tel" class="form-control" name="tel" id="tel" placeholder="0912345678" pattern="[0-9]{9}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="birth" class="form-label">
                            玩家生日
                            <span class="text-danger">*</span>
                            <small class="text-muted">(格式 19990401，1999年4月1號)</small>
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control" name="birth" id="birth" placeholder="19990401" pattern="[0-9]{8}" required>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button id="submit" type="submit" class="btn btn-primary">登入</button>
                    </div>
                </form>

                <div id="resultArea" class="mt-4" style="display: none;"></div>

                <div id="tips" class="mt-4">
                    <div class="alert alert-info" role="alert">
                        <h4 class="alert-heading">注意事項</h4>
                        <p class="mb-0">當天遊玩點數，需等待隔天查詢，店員努力輸入系統中。如有急需或是點數與想像的不同，請勿慌張，可以私訊 <a href="https://www.instagram.com/onesoul.zb" class="alert-link" target="_blank">IG: onesoul.zb</a>，小編會盡快確認。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    $(function() {
        const form = $("#myForm");
        const submitButton = $('#submit');
        const mainContent = $('#main-content');
        const loadingElement = $('#show');
        const resultArea = $('#resultArea');
        const logoutBtn = $('#logoutBtn');
        const loadingIndicator = $('#loadingIndicator');

        form.validate({
            rules: {
                tel: {
                    required: true,
                    digits: true
                },
                birth: {
                    required: true,
                    digits: true
                }
            },
            messages: {
                tel: {
                    required: "必填",
                    digits: "數字格式不正確"
                }
            },
            submitHandler: queryMember
        });

        function queryMember() {
            const tel = $("#tel").val().trim();
            const birth = $("#birth").val().trim();
            setUIState('loading');
            
            google.script.run
                .withSuccessHandler(handleSuccess)
                .withFailureHandler(handleFailure)
                .login(tel,birth);

            return false;
        }

        function handleSuccess(responseJsonString) {
            try {
                const response = JSON.parse(responseJsonString);
                if (response.sessionId) {
                    localStorage.setItem('sessionId', response.sessionId);
                    localStorage.setItem('loginTime', new Date().getTime());
                    displayResult(response.memberInfo);
                    Swal.fire({
                        title: "登入成功",
                        text: "可以去看看GK清單，看有沒有可以換得",
                        icon: "success"
                    });
                } else {
                    displayError(response.message || '無效的電話號碼或生日');
                }
            } catch (error) {
                console.error('JSON 解析錯誤', error);
                displayError('數據處理出錯，請稍後再試');
            } finally {
                setUIState('idle');
            }
        }

        function handleFailure(error) {
            console.error('請求失敗', error);
            displayError('發生錯誤：' + error);
            setUIState('idle');
        }

        function displayResult(memberInfo) {
            const resultTemplate = `
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title fs-5">會員信息</h5>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                會員名稱
                                <span class="badge bg-primary rounded-pill fs-4">${escapeHtml(maskName(memberInfo.name))}</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                會員點數
                                <span class="badge bg-success rounded-pill fs-4">${memberInfo.points}</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                備註
                                <span class="badge bg-success rounded-pill fs-4">${memberInfo.info || ''}</span>
                            </li>
                        </ul>
                    </div>
                </div>
            `;

            resultArea.html(resultTemplate).show();
            form.hide();
            logoutBtn.show();
        }

        function displayError(message) {
            const errorTemplate = `
                <div class="alert alert-danger" role="alert">
                    <h4 class="alert-heading">錯誤</h4>
                    <p>${escapeHtml(message)}</p>
                </div>
            `;

            resultArea.html(errorTemplate).show();
        }

        function setUIState(state) {
            const isLoading = state === 'loading';
            submitButton.prop('disabled', isLoading);
            mainContent.toggleClass('d-none', isLoading);
            loadingElement.toggleClass('d-none my-5', !isLoading);
            if (isLoading) resultArea.hide();
        }

        function maskName(name) {
            if (!name) return '未知';
            return name.length > 2 ? name[0] + 'x'.repeat(name.length - 2) + name[name.length - 1] : name[0] + 'x';
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            })[char]);
        }

        function displayLoginForm() {
            form.show();
            resultArea.hide();
            logoutBtn.hide();
        }

        function hideLoginForm() {
            form.hide();
            resultArea.hide();
            logoutBtn.hide();
        }

        function showLoading() {
            hideLoginForm();
            loadingIndicator.show();
        }

        function hideLoading() {
            loadingIndicator.hide();
        }

        function logout() {
            localStorage.removeItem('sessionId');
            localStorage.removeItem('loginTime');
            displayLoginForm();
            Swal.fire({
                title: "已登出",
                text: "您已成功登出系統",
                icon: "info"
            });
        }

        logoutBtn.on('click', logout);

        function checkSession() {
            showLoading();
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId && !isSessionExpired()) {
                google.script.run
                    .withSuccessHandler(handleSessionCheck)
                    .withFailureHandler(handleSessionCheckFailure)
                    .checkLoginStatus(sessionId);
            } else {
                hideLoading();
                displayLoginForm();
            }
        }

        function handleSessionCheck(responseJsonString) {
            try {
                const response = JSON.parse(responseJsonString);
                if (response.points !== -1) {
                    displayResult(response);
                } else {
                    console.log(response.message);
                    localStorage.removeItem('sessionId');
                    localStorage.removeItem('loginTime');
                    displayLoginForm();
                }
            } catch (error) {
                console.error('Session info parsing error', error);
                localStorage.removeItem('sessionId');
                localStorage.removeItem('loginTime');
                displayLoginForm();
            } finally {
                hideLoading();
            }
        }

        function handleSessionCheckFailure(error) {
            console.error('Session check failed', error);
            localStorage.removeItem('sessionId');
            localStorage.removeItem('loginTime');
            displayLoginForm();
            hideLoading();
        }

        function isSessionExpired() {
            const loginTime = localStorage.getItem('loginTime');
            if (!loginTime) return true;
            
            const now = new Date().getTime();
            const threeDaysInMillis = 3 * 24 * 60 * 60 * 1000;
            return (now - parseInt(loginTime)) > threeDaysInMillis;
        }

        // 在頁面加載時檢查登入狀態
        checkSession();
    });
    </script>
</body>
</html>
