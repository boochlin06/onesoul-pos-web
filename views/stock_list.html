<script>
  
$(function() {
    $('#gkTable').bootstrapTable();

function isSessionExpired() {
  const loginTime = localStorage.getItem('loginTime');
  if (!loginTime) return true;
  
  const now = new Date().getTime();
  const threeDaysInMillis = 3 * 24 * 60 * 60 * 1000;
  return (now - parseInt(loginTime)) > threeDaysInMillis;
}
// 检查会话是否过期
  if (!isSessionExpired()) {
      // 显示清单
      $('#gkListContainer').removeClass('d-none');
      $('#gkTable').bootstrapTable();

      //   icon: "success"
      // });
  } else {
      // 显示会话过期警告

        title: "尚未登入",
        text: "請先到登入頁面後，登入帳號後，方可取得GK清單",
        icon: "error"
      });
  }
});
</script>
